{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-container" aria-live="polite">
    {% for category, message in messages %}
    <div class="flash-message {{ category }} rounded-xl shadow-lg border border-slate-200/80 bg-white/95 backdrop-blur">
        <span>{{ message }}</span>
        <button type="button" class="flash-close text-slate-500 hover:text-slate-900" aria-label="Dismiss notification">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}
