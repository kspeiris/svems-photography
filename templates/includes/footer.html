<footer class="footer mt-10">
    <div class="footer-content max-w-6xl mx-auto px-4 md:px-6">
        <div class="footer-section scroll-reveal">
            <div class="footer-logo flex items-center gap-3">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Svems Logo">
                <span class="brand-name">Svems</span>
            </div>
            <p class="text-slate-200/90 mt-4">Capturing magic in every frame with a focus on story and emotion.</p>
        </div>
        <div class="footer-section scroll-reveal reveal-delay-1">
            <h3 class="font-display">Quick Links</h3>
            <a href="{{ url_for('home') }}" class="footer-link">Home</a>
            <a href="{{ url_for('portfolio') }}" class="footer-link">Portfolio</a>
            <a href="{{ url_for('about') }}" class="footer-link">About</a>
            <a href="{{ url_for('contact') }}" class="footer-link">Contact</a>
            {% if not current_user.is_authenticated %}
            <a href="{{ url_for('admin_login') }}" class="footer-link opacity-50 hover:opacity-100">Staff Login</a>
            {% endif %}
        </div>
        <div class="footer-section scroll-reveal reveal-delay-2">
            <h3 class="font-display">Connect</h3>
            <div class="social-links flex gap-4 mt-4">
                <a href="#" class="social-icon magnetic-element" aria-label="Instagram"><i class="fab fa-instagram"
                        aria-hidden="true"></i></a>
                <a href="#" class="social-icon magnetic-element" aria-label="Facebook"><i class="fab fa-facebook"
                        aria-hidden="true"></i></a>
                <a href="#" class="social-icon magnetic-element" aria-label="Twitter"><i class="fab fa-twitter"
                        aria-hidden="true"></i></a>
                <a href="#" class="social-icon magnetic-element" aria-label="LinkedIn"><i class="fab fa-linkedin"
                        aria-hidden="true"></i></a>
            </div>
        </div>
    </div>

    <div class="footer-bottom border-t border-white/20">
        <p>&copy; {{ current_year }} Svems Photography by Pulindu Peiris. All rights reserved.</p>
    </div>
</footer>
